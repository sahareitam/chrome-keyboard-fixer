<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Keyboard Layout Fixer</title>
    <style>
        body {
            width: 300px;
            padding: 10px;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 8px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>Keyboard Layout Fixer</h3>
        <textarea id="inputText" placeholder="הקלד או הדבק טקסט כאן"></textarea>
        <button id="convertBtn">המר טקסט (Ctrl+Alt)</button>
        <div id="result"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
